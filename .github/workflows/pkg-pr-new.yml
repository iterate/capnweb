# Continuous preview publishing via https://pkg.pr.new.
#
# Every push to main and every PR publishes a tarball to pkg.pr.new's CDN
# (no npm token involved), installable as:
#
#   https://pkg.pr.new/@iterate-com/capnweb@main
#   https://pkg.pr.new/@iterate-com/capnweb@<sha>
#   https://pkg.pr.new/@iterate-com/capnweb@<pr>
#
# Or, with the full repo path form:
#
#   https://pkg.pr.new/iterate/capnweb/@iterate-com/capnweb@main
#
# Requires the pkg.pr.new GitHub App on this repo:
#   https://github.com/apps/pkg-pr-new
name: pkg.pr.new
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npx pkg-pr-new publish
