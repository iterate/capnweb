# Publish @iterate-com/capnweb to npm on version tags (v*).
#
# Setup (once):
# 1. Create the npm org / claim the @iterate-com scope if needed.
# 2. Either:
#    a) Trusted publishing: on npm, add GitHub Actions OIDC publisher for
#       package @iterate-com/capnweb → repo iterate/capnweb, workflow release.yml
#       (preferred; no long-lived token), or
#    b) Add repo secret NPM_TOKEN with a granular publish token for the scope.
# 3. Tag a release: git tag v0.10.0 && git push origin v0.10.0
#
# pkg.pr.new covers continuous PR/main previews; this workflow is for real
# registry releases that external `iterate` installs can pin.
name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to check out (defaults to current ref)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write # npm trusted publishing / provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24" # includes npm 11.5.1 or later, needed for trusted publishing
          cache: "npm"
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Prefer OIDC trusted publishing when configured; fall back to NPM_TOKEN.
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
